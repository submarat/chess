<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>Chess</h1>
    </header>
    <div id="game-container">
      <div id="captures-black" class="captures"></div>
      <div id="board-wrapper">
        <div id="rank-labels"></div>
        <div id="board"></div>
        <div id="file-labels"></div>
      </div>
      <div id="captures-white" class="captures"></div>
      <div id="sidebar">
        <div id="status">Your turn (White)</div>
        <div id="move-history">
          <h3>Moves</h3>
          <div id="moves-list"></div>
        </div>
        <div id="controls">
          <button id="new-game-btn">New Game</button>
          <button id="undo-btn">Undo</button>
          <div id="difficulty">
            <label for="depth-select">AI Strength</label>
            <select id="depth-select">
              <option value="2">Easy</option>
              <option value="3" selected>Medium</option>
              <option value="4">Hard</option>
            </select>
          </div>
        </div>
      </div>
    </div>
    <div id="promotion-modal" class="hidden">
      <div id="promotion-choices"></div>
    </div>
  </div>
  <script src="engine.js"></script>
  <script src="ai.js"></script>
  <script src="ui.js"></script>
</body>
</html>
